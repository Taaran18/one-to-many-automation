services:
  # FastAPI Backend
  - type: web
    name: onetomany-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: BRIDGE_URL
        sync: false

  # WhatsApp Bridge
  - type: web
    name: onetomany-bridge
    runtime: node
    rootDir: whatsapp-bridge
    buildCommand: npm install
    startCommand: node --max-old-space-size=200 index.js
    envVars:
      - key: PORT
        value: "3001"
