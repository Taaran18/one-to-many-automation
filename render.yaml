services:
  # ── Backend (Express + WhatsApp bridge + Email bridge, all in-process) ────────
  - type: web
    name: onetomany-backend
    runtime: node
    rootDir: backend-node
    buildCommand: npm install && npx puppeteer browsers install chrome && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_EXECUTABLE_PATH
        sync: false   # set to system Chrome path on the host

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  - type: web
    name: onetomany-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
