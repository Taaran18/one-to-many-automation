services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: onetomany-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL after deploy
      - key: BACKEND_URL
        sync: false          # set to this service's Render URL after deploy
      - key: BRIDGE_URL
        sync: false          # set to onetomany-bridge Render URL after deploy

  # ── WhatsApp Bridge ──────────────────────────────────────────────────────────
  - type: web
    name: onetomany-bridge
    runtime: node
    rootDir: whatsapp-bridge
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node index.js
    envVars:
      - key: PORT
        value: "3001"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.puppeteer-cache
